name: Build and Release JAR

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write


jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build shaded JAR
        run: mvn -q -DskipTests package

      - name: Locate shaded jar
        id: jar
        run: |
          FILE=$(ls target/*-shaded.jar | head -n 1)
          if [ -z "$FILE" ]; then
            echo "No shaded jar found!" >&2
            exit 1
          fi
          cp "$FILE" bagofhoney-latest.jar
          echo "Copied $FILE to bagofhoney-latest.jar"

      - name: Lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/bagofhoney:latest
            ghcr.io/${{ env.REPO_OWNER }}/bagofhoney:${{ github.sha }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "BagOfHoney Build #${{ github.run_number }}"
          generate_release_notes: true
          body: |
            🐝 **Automated release build**

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Includes all recent fixes and enhancements.
          files: bagofhoney-latest.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
